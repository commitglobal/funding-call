on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

name: Build Docker image

jobs:

  build:
    name: Build Docker image
    uses: code4romania/.github/.github/workflows/build-push-image-ecr.yml@main
    with:
      image_name: funding_call
      region: eu-west-1
      context: ./
      dockerfile: ./docker/dockerfiles/Dockerfile
    secrets:
      role_to_assume: ${{ secrets.ROLE_TO_ASSUME }}
