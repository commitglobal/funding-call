services:

  funding_call_base:
    container_name: funding_call_dev
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"

  funding_call_dev_base:
    extends:
      service: funding_call_base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/Dockerfile.dev
    volumes:
      - ./backend:/var/www/funding_call/backend
      - ./frontend/src:/var/www/funding_call/frontend/src
    env_file:
      - .env
    ports:
      - "${WEBAPP_PORT:-8080}:8000"
      - "${STATIC_PORT:-3000}:3000"

  db_base:
    container_name: funding_call_db_dev
    env_file:
      - .env

  db_base_mysql:
    extends:
      service: db_base
    image: mysql:9.7.0
    volumes:
      - funding_call_mysql:/var/lib/mysql
    environment:
      MYSQL_DATABASE: "${DATABASE_NAME}"
      MYSQL_USER: "${DATABASE_USER}"
      MYSQL_PASSWORD: "${DATABASE_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD}"
    ports:
      - "${DATABASE_PORT:-3306}:3306"

  db_base_psql:
    extends:
      service: db_base
    image: postgres:18.4
    volumes:
      - funding_call_psql:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "${DATABASE_NAME}"
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
    ports:
      - "${DATABASE_PORT:-5432}:5432"
